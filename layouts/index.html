<!DOCTYPE html>
<html>
  {{ partial "header.html" . }}
  <body>
    <div class="content">
      {{ partial "head.html" . }}

      <main class="list">
        {{- if isset .Site.Params "subtitle" -}}
        <div class="site-description">
          <p>{{ .Site.Params.Subtitle | .Page.RenderString }}</p>
        </div>
        {{- end -}}

        {{ .Content }}
      </main>
      {{ partial "footer.html" . }}
    </div>
  </body>
</html>
